movieService:
  replicaCount: 1
  env:
    DATABASE_URI: "postgresql://movie_db_username:movie_db_password@movie-db/movie_db_qa"
    CAST_SERVICE_HOST_URL: "http://cast-service:8000/api/v1/casts/"

castService:
  replicaCount: 1
  env:
    DATABASE_URI: "postgresql://cast_db_username:cast_db_password@cast-db/cast_db_qa"

movieDb:
  auth:
    username: movie_db_username
    password: movie_db_password
    database: movie_db_qa

castDb:
  auth:
    username: cast_db_username
    password: cast_db_password
    database: cast_db_qa

ingress:
  enabled: false